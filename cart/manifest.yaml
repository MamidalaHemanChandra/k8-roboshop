apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    component: cart
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: cart
      tier: database
  template:
    metadata:
      labels:
        project: roboshop
        component: cart
        tier: database
    spec:
      containers:
      - name: cart
        image: mamidalahemanchandra/cart:v1
        imagePullPolicy: Always
        ports:
        - name: liveness-port
          containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          initialDelaySeconds: 30
          periodSeconds: 60
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: cart
    tier: database
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080